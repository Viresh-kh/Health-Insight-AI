kind = "web"
previewPath = "/"
title = "HealthCheck AI"
version = "1.0.0"
id = "artifacts/healthcheck-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18140
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/healthcheck-ai run dev"

[services.env]
PORT = "18140"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/healthcheck-ai", "run", "build"]
publicDir = "artifacts/healthcheck-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
